services:
  mongo:
    image: mongo:7
    container_name: aitask-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: aitask-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aitask-backend
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    env_file:
      - ./backend/.env
    environment:
      PORT: ${BACKEND_PORT:-5000}
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/aitaskplatform}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_QUEUE_NAME: ${REDIS_QUEUE_NAME:-tasks_queue}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
    ports:
      - "5000:5000"

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: aitask-worker
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    env_file:
      - ./worker/.env
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/aitaskplatform}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-aitaskplatform}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_QUEUE_NAME: ${REDIS_QUEUE_NAME:-tasks_queue}
      MAX_RETRIES: ${MAX_RETRIES:-2}
      POLL_TIMEOUT_SECONDS: ${POLL_TIMEOUT_SECONDS:-5}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:5000
    container_name: aitask-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:8080"

volumes:
  mongo_data:
